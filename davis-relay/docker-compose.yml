services:
  davis-relay:
    build: .
    container_name: davis-relay
    restart: unless-stopped
    # USB pass-through — rtldavis claims the SDR via libusb and retunes
    # it ~every 2.5s to follow the Davis FHSS hop pattern. Cannot share
    # the dongle with rtl_433.
    devices:
      - /dev/bus/usb:/dev/bus/usb
    environment:
      BACKEND_URL:   ${BACKEND_URL:-}
      INGEST_TOKEN:  ${INGEST_TOKEN:-}
      # 1..8 — the ISS "transmitter ID" as shown in the WeatherLink
      # Console (DIP switches under the ISS battery cover). Internally
      # we send the bitmask flag (-tr 1<<(id-1)) to rtldavis.
      DAVIS_ID:      ${DAVIS_ID:-1}
      DAVIS_NAME:    ${DAVIS_NAME:-Davis Vantage Pro2 (SDR)}
      DAVIS_LOCATION: ${DAVIS_LOCATION:-}
      # Inches per bucket tip. US standard VP2 = 0.01; metric = 0.00787
      # (0.2 mm); some older / large-bucket sensors = 0.1mm = 0.00394.
      DAVIS_RAIN_BUCKET_IN: ${DAVIS_RAIN_BUCKET_IN:-0.01}
      # Yearly-rain baseline (inches). Set to your prior data source's
      # current yearlyrainin at deploy time; rain is a 7-bit free-running
      # bucket counter that wraps every 128 tips, so we baseline once and
      # accumulate deltas. Leave at 0 to skip yearly rain posting.
      DAVIS_RAIN_YEARLY_BASELINE_IN: ${DAVIS_RAIN_YEARLY_BASELINE_IN:-0}
      # Degrees to add to wind direction. Davis broadcasts raw 0-255 →
      # 0-360°; small calibration offsets are normal.
      DAVIS_WIND_DIR_OFFSET: ${DAVIS_WIND_DIR_OFFSET:-0}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      # Diagnostic: listen on all 8 transmitter slots (-tr 255) and
      # log undefined signals (-u). Useful for confirming the ISS is
      # on the air without knowing the right DIP-switch ID. Unset for
      # production.
      DEBUG_LISTEN_ALL: ${DEBUG_LISTEN_ALL:-}
    healthcheck:
      test: ["CMD", "pgrep", "-f", "davis_relay.py"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

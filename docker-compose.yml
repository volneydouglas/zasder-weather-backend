services:
  zasder-weather:
    # Prefer the published image so upgrades are `docker compose pull && up -d`
    # (no local rebuild). `build: .` stays as a fallback — run
    # `docker compose build` to build from source instead. Pin a version by
    # replacing `:latest` with e.g. `:1.0.0`.
    image: ghcr.io/volneydouglas/zasder-weather-backend:latest
    build: .
    container_name: zasder-weather
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      DATABASE_PATH: /data/weather.db
    volumes:
      - weather-data:/data
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/healthz').read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  weather-data:

app = "zasder-weather"
primary_region = "lax"

[build]
  dockerfile = "Dockerfile"

[env]
  DATABASE_PATH = "/data/weather.db"
  POLL_INTERVAL_SECONDS = "60"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/healthz"

[[mounts]]
  source = "weather_data"
  destination = "/data"

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"

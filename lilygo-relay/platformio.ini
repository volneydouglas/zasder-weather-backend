; LilyGO T3 LoRa32 V1.6.1 — ESP32 + SX1276
;
; Two build envs, one per band. The board is the same hardware in both
; cases; only the frequency, decoder subset, and source tag change.
; Build whichever band matches the dongle you're flashing:
;
;   pio run -e t3_v161_433  -t upload   # AcuRite Atlas (433.92 MHz)
;   pio run -e t3_v161_915  -t upload   # Fineoffset family (915 MHz)
;
; First-boot provisioning: the board comes up as the AP "ZasderLilyGO".
; Join it from a phone, fill in your Wi-Fi creds + BACKEND_URL +
; INGEST_TOKEN, save. From then on it connects on every reboot.

[platformio]
default_envs = t3_v161_433

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
upload_speed = 921600
; rtl_433_ESP carries its own RadioLib pin. WiFiManager + ArduinoJson
; are stable APIs we depend on directly.
lib_deps =
    NorthernMan54/rtl_433_ESP @ ^0.3.4
    tzapu/WiFiManager @ ^2.0.17
    bblanchon/ArduinoJson @ ^7.0.4
build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DTZ_OFFSET_MINUTES=0    ; UTC for the timestamp_utc field
    -DRECEIVER_GPIO=32        ; SX1276 DIO0 → ESP32 GPIO32 on V1.6.1
    -DLED_BUILTIN_RX=25       ; on-board LED — flashes on RX

; ───────── 433 MHz: AcuRite Atlas + neighborhood 433 traffic ─────────
[env:t3_v161_433]
board = ttgo-lora32-v21
build_flags =
    ${env.build_flags}
    -DRF_MODULE_FREQUENCY=433.92
    -DZASDER_SOURCE_TAG=\"acurite-atlas-lilygo\"
    ; Narrow decoder set to keep RAM/decode time low. Add more if you
    ; want a broader survey; rtl_433_ESP exposes ~30 protocols.
    -DRTL_DEBUG=0
    -DRTL_VERBOSE=0

; ───────── 915 MHz: Fineoffset WH24 / WH65 / WS80 (+ WH32B indoor) ─────────
[env:t3_v161_915]
board = ttgo-lora32-v21
build_flags =
    ${env.build_flags}
    -DRF_MODULE_FREQUENCY=915.0
    -DZASDER_SOURCE_TAG=\"fineoffset-wh24-lilygo\"
    -DRTL_DEBUG=0
    -DRTL_VERBOSE=0

; LilyGO T3 LoRa32 V1.6.1 — ESP32 + SX1276
;
; Two build envs, one per band. The board is the same hardware in both
; cases; only the frequency, decoder subset, and source tag change.
; Build whichever band matches the dongle you're flashing:
;
;   pio run -e t3_v161_433  -t upload   # AcuRite Atlas (433.92 MHz)
;   pio run -e t3_v161_915  -t upload   # Fineoffset family (915 MHz)
;
; First-boot provisioning: the board comes up as the WPA2 AP "ZasderLilyGO"
; (password "zasder-setup").
; Join it from a phone, fill in your Wi-Fi creds + BACKEND_URL +
; INGEST_TOKEN, save. From then on it connects on every reboot.

[platformio]
default_envs = t3_v161_433

[env]
platform = espressif32
framework = arduino
monitor_speed = 115200
; 115200 (instead of the PIO default 921600) — the CP2104 on the LilyGO
; T3 V1.6.1 + macOS combo corrupts the stream at high speed and the
; flash write dies mid-transfer. 115200 is slow (~2 min per upload)
; but reliable. Bump if you have a board/host combo that handles it.
upload_speed = 115200
; rtl_433_ESP carries its own RadioLib pin. WiFiManager + ArduinoJson
; are stable APIs we depend on directly.
lib_deps =
    ; NorthernMan54's upstream isn't published to the PIO registry — we
    ; pin to the v0.4.0 tag (rtl_433 24.10 refresh, Nov 2024). Bump as
    ; new releases land; only the registry's older shchuko fork is
    ; available via the `owner/name` shorthand.
    https://github.com/NorthernMan54/rtl_433_ESP.git#v0.4.0
    tzapu/WiFiManager @ ^2.0.17
    bblanchon/ArduinoJson @ ^7.0.4
    olikraus/U8g2 @ ^2.36.5
build_flags =
    -DCORE_DEBUG_LEVEL=2
    -DTZ_OFFSET_MINUTES=0     ; UTC for the timestamp_utc field
    ; Local wall-clock offset used ONLY for the nightly scheduled restart
    ; (see maybeNightlyRestart in main.cpp). Does NOT affect POST timestamps.
    ; Arizona = MST (UTC-7), no DST → -420. Public default in code is 0 (UTC).
    -DLOCAL_TZ_OFFSET_MINUTES=-420
    -DLED_BUILTIN_RX=25       ; on-board LED — flashes on RX
    ; RECEIVER pin is auto-resolved via rtl_433_ESP.h from the
    ; ttgo-lora32-v21 board variant (RF_MODULE_RECEIVER_GPIO).

; ───────── 433 MHz: AcuRite Atlas + neighborhood 433 traffic ─────────
[env:t3_v161_433]
board = ttgo-lora32-v21
; huge_app.csv = 3 MB app / 1 MB SPIFFS / no OTA. Default partition
; gives the app only 1.25 MB which isn't enough — rtl_433_ESP's decoders
; + WiFiManager + ArduinoJson + TLS together land around 1.4 MB. OTA
; isn't wired up yet (v1 reflash is over USB anyway).
board_build.partitions = huge_app.csv
build_flags =
    ${env.build_flags}
    -DRF_MODULE_FREQUENCY=433.92
    -DZASDER_SOURCE_TAG=\"acurite-atlas-lilygo\"
    ; Narrow decoder set to keep RAM/decode time low. Add more if you
    ; want a broader survey; rtl_433_ESP exposes ~30 protocols.
    -DRTL_DEBUG=0
    -DRTL_VERBOSE=0

; ───────── 915 MHz: Fineoffset WH24 / WH65 / WS80 (+ WH32B indoor) ─────────
[env:t3_v161_915]
board = ttgo-lora32-v21
board_build.partitions = huge_app.csv
build_flags =
    ${env.build_flags}
    -DRF_MODULE_FREQUENCY=915.0
    -DZASDER_SOURCE_TAG=\"fineoffset-wh24-lilygo\"
    ; Fine Offset / WS-2000 family broadcast in FSK at 915 MHz. The
    ; SX1276 has to commit to OOK or FSK demod at the hardware level;
    ; rtl_433_ESP defaults to OOK (good for 433 MHz Atlas/Acurite) but
    ; OOK mode literally cannot hear FSK signals. The RTL-SDR on the
    ; Pi handles both because it samples raw IQ; the SX1276 cannot.
    -DOOK_MODULATION=false
    -DRTL_DEBUG=0
    -DRTL_VERBOSE=0

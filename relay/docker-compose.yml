services:
  acurite-relay:
    build: .
    container_name: acurite-relay
    restart: unless-stopped
    # Hub speaks to default ports — bind directly on the host.
    # If 80/443 are taken on this machine, give the container its own
    # LAN IP via macvlan or move it to a single-purpose box.
    ports:
      - "80:80"
      - "443:443"
    env_file:
      - .env
    volumes:
      - ./data:/data    # observations.jsonl + raw.jsonl
      - ./certs:/certs  # self-signed cert generated on first boot
    healthcheck:
      test: ["CMD", "python", "-c", "import socket; s=socket.socket(); s.settimeout(2); s.connect(('localhost', 80)); s.close()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
